<div class="tasks-wrapper">

  <h2 class="tasks-header">My Tasks</h2>

  <!-- KANBAN BOARD -->
  <div class="kanban">

    <!-- PENDING -->
    <div cdkDropList [cdkDropListData]="pendingTasks" class="column"
         (cdkDropListDropped)="drop($event, 'pending')">
      <h3>Pending</h3>

      <div *ngFor="let task of pendingTasks" cdkDrag>
         <div 
    class="task-card"
    [ngClass]="{
      'urgent': isUrgent(task),
      'high-priority': task.priority === 'high',
      'medium-priority': task.priority === 'medium',
      'low-priority': task.priority === 'low'
    }">
        <ng-container *ngTemplateOutlet="taskTemplate; context:{task:task}"></ng-container>
      </div>
    </div>

    <!-- IN PROGRESS -->
    <div cdkDropList [cdkDropListData]="progressTasks" class="column"
         (cdkDropListDropped)="drop($event, 'in_progress')">
      <h3>In Progress</h3>

      <div *ngFor="let task of progressTasks" cdkDrag>
         <div 
    class="task-card"
    [ngClass]="{
      'urgent': isUrgent(task),
      'high-priority': task.priority === 'high',
      'medium-priority': task.priority === 'medium',
      'low-priority': task.priority === 'low'
    }">

        <ng-container *ngTemplateOutlet="taskTemplate; context:{task:task}"></ng-container>
      </div>
    </div>

    <!-- COMPLETED -->
    <div cdkDropList [cdkDropListData]="completedTasks" class="column"
         (cdkDropListDropped)="drop($event, 'completed')">
      <h3>Completed</h3>

      <div *ngFor="let task of completedTasks" cdkDrag>
         <div 
    class="task-card"
    [ngClass]="{
      'urgent': isUrgent(task),
      'high-priority': task.priority === 'high',
      'medium-priority': task.priority === 'medium',
      'low-priority': task.priority === 'low'
    }">

        <ng-container *ngTemplateOutlet="taskTemplate; context:{task:task}"></ng-container>
      </div>
    </div>

  </div>

</div>


<!-- TASK TEMPLATE -->
<ng-template #taskTemplate let-task="task">

  <div class="task-top">
    <h4>{{ task.title }}</h4>
    <span class="badge" [ngClass]="task.status">{{ task.status }}</span>
       <span class="priority" [ngClass]="task.priority">
      {{ task.priority }}
    </span>
  </div>
<button 
  class="start-btn"
  *ngIf="task.status === 'pending'"
  (click)="updateStatus(task.id, { target: { value: 'in_progress' } })">

  <span class="material-icons">play_arrow</span>
  Start Task
</button>

  <p>{{ task.description }}</p>
  <p 
  class="deadline" 
  [ngClass]="{'overdue': isOverdue(task.deadline)}">
  Deadline: {{ task.deadline | date:'shortDate' }}
</p>

  <!-- PROGRESS BAR -->
  <div class="progress">
    <div class="progress-bar" 
         [style.width.%]="task.status === 'completed' ? 100 : (task.status === 'in_progress' ? 60 : 20)">
    </div>
  </div>

  <!-- APPROVAL -->
  <p>Approval: <b [ngClass]="task.completion_status">{{ task.completion_status }}</b></p>

  <!-- VIEW FILE (POPUP) -->
  <button class="link-btn" *ngIf="task.attachment_url"
          (click)="openFile(task)">
    📎 View Work
  </button>

  <!-- WORK INPUT -->
  <textarea [(ngModel)]="task.workLog" placeholder="Describe your work"></textarea>

  <div class="upload-row">
    <input type="file" (change)="onFileSelect($event, task)">
    <input type="number" [(ngModel)]="task.hours" placeholder="Hours">
  </div>

<div class="action-buttons">

  <button class="submit-btn"
          (click)="submitWork(task)"
          [disabled]="task.uploading || task.completion_status === 'approved'">
    {{ task.uploading ? 'Uploading...' : 'Submit Work' }}
  </button>

  <button class="complete-btn"
          *ngIf="task.status !== 'completed'"
          (click)="markComplete(task.id)">
    ✅ Mark Complete
  </button>

</div>
</ng-template>


<!-- FILE PREVIEW MODAL -->
<div class="modal" *ngIf="previewUrl">
  <div class="modal-content">

    <span class="close" (click)="previewUrl=null">✖</span>

    <iframe [src]="previewUrl" width="100%" height="400px"></iframe>

  </div>
</div>
