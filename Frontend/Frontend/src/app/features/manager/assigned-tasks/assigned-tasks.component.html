<div class="tasks-container">

  <h1>Assigned Tasks</h1>

  <table>
    <thead>
      <tr>
        <th>Employee</th>
        <th>Emp ID</th>
        <th>Title</th>
        <th>Status</th>
        <th>Deadline</th>
      </tr>
    </thead>

  <tbody *ngIf="tasks && tasks.length > 0; else noData">
  <tr *ngFor="let task of tasks">
    <td>{{ task.employee_name }}</td>
    <td>{{ task.employee_code || 'N/A' }}</td>
    <td>{{ task.title }}</td>
    <td>{{ task.status }}</td>
    <td>{{ task.deadline | date:'shortDate' }}</td>
  </tr>
</tbody>

<ng-template #noData>
  <tr>
    <td colspan="5" style="text-align:center;">No tasks found</td>
  </tr>
</ng-template>
  </table>

</div>
